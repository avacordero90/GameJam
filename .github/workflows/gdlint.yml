name: GDScript Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gdlint:
    name: gdlint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Run gdlint
        run: |
          shopt -s globstar nullglob
          files=(**/*.gd)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .gd files found, skipping."
            exit 0
          fi
          gdlint "${files[@]}"
